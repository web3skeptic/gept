<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Gender Trainer — der/die/das</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f8;
  --card: #ffffff;
  --primary: #6366f1;
  --primary-light: #a5b4fc;
  --primary-dark: #4338ca;
  --accent: #8b5cf6;
  --success: #22c55e;
  --success-bg: #dcfce7;
  --error: #ef4444;
  --error-bg: #fee2e2;
  --text: #1e1b4b;
  --text-secondary: #64748b;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(99, 102, 241, 0.10);
  --shadow-lg: 0 8px 40px rgba(99, 102, 241, 0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --der: #3b82f6;
  --die: #ec4899;
  --das: #f59e0b;
  --der-bg: #dbeafe;
  --die-bg: #fce7f3;
  --das-bg: #fef3c7;
  --der-dark: #1d4ed8;
  --die-dark: #db2777;
  --das-dark: #d97706;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
  position: relative;
}

/* Header */
.header {
  text-align: center;
  padding: 20px 0 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.rules-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font-size: 1rem;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  color: var(--text);
  transition: all 0.2s;
  white-space: nowrap;
}
.rules-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

/* Accuracy strip */
.accuracy-strip {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.dots-row {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 8px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #e2e8f0;
  transition: background 0.3s, transform 0.3s;
  flex-shrink: 0;
}
.dot.correct { background: var(--success); }
.dot.wrong { background: var(--error); }
.dot.latest { transform: scale(1.3); }
.accuracy-text {
  text-align: center;
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.accuracy-text strong {
  color: var(--text);
  font-weight: 700;
}

/* Progress bar */
.progress-section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.progress-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Word card */
.card-container {
  perspective: 800px;
  margin-bottom: 16px;
}
.word-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 24px 28px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  transition: transform 0.25s, opacity 0.25s;
  position: relative;
  overflow: hidden;
}
.word-card.entering {
  transform: translateY(12px);
  opacity: 0;
}
.word-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--der), var(--die), var(--das));
}
.word-de {
  font-size: 2.4rem;
  font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.word-en {
  font-size: 1rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.word-category {
  display: inline-block;
  margin-top: 10px;
  font-size: 0.72rem;
  color: var(--text-tertiary);
  background: var(--bg);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.btn-article {
  flex: 1;
  padding: 18px 8px;
  border: 3px solid transparent;
  border-radius: var(--radius);
  font-size: 1.4rem;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.btn-article:active {
  transform: scale(0.96);
}
.btn-der {
  background: var(--der-bg);
  color: var(--der-dark);
  border-color: var(--der-bg);
}
.btn-der:hover { border-color: var(--der); box-shadow: 0 4px 20px rgba(59,130,246,0.25); }
.btn-die {
  background: var(--die-bg);
  color: var(--die-dark);
  border-color: var(--die-bg);
}
.btn-die:hover { border-color: var(--die); box-shadow: 0 4px 20px rgba(236,72,153,0.25); }
.btn-das {
  background: var(--das-bg);
  color: var(--das-dark);
  border-color: var(--das-bg);
}
.btn-das:hover { border-color: var(--das); box-shadow: 0 4px 20px rgba(245,158,11,0.25); }

.btn-article.correct-flash {
  animation: correctPulse 0.35s ease-out;
}
@keyframes correctPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.btn-article.wrong-flash {
  animation: wrongShake 0.4s ease-out;
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.btn-article.disabled {
  opacity: 0.35;
  pointer-events: none;
}

/* Feedback */
.feedback {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  display: none;
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.feedback.show { display: block; }
.feedback.wrong-feedback {
  border-left: 4px solid var(--error);
}
.feedback-title {
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 6px;
}
.feedback-title.wrong { color: var(--error); }
.feedback-explanation {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
}
.feedback-actions {
  display: flex;
  gap: 8px;
}
.btn-try-again, .btn-skip {
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: inherit;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-try-again {
  background: var(--primary);
  color: white;
}
.btn-try-again:hover { background: var(--primary-dark); }
.btn-skip {
  background: var(--bg);
  color: var(--text-secondary);
}
.btn-skip:hover { background: var(--border); }

/* Unlock overlay */
.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(30, 27, 75, 0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.overlay.show {
  display: flex;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.unlock-card {
  background: var(--card);
  border-radius: 20px;
  padding: 32px 24px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: popIn 0.35s ease-out;
}
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.unlock-emoji {
  font-size: 3rem;
  margin-bottom: 12px;
}
.unlock-title {
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 8px;
  color: var(--text);
}
.unlock-desc {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 16px;
}
.unlock-examples {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.unlock-example {
  background: var(--bg);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
}
.btn-continue {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  border: none;
  padding: 14px 32px;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s;
}
.btn-continue:hover { transform: scale(1.03); }
.btn-continue:active { transform: scale(0.97); }

/* Rules panel */
.rules-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(30, 27, 75, 0.5);
  backdrop-filter: blur(3px);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-y: auto;
}
.rules-overlay.show {
  display: flex;
  animation: fadeIn 0.25s ease-out;
}
.rules-panel {
  background: var(--card);
  border-radius: 20px;
  padding: 28px 20px;
  max-width: 460px;
  width: 100%;
  margin: 20px auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: popIn 0.3s ease-out;
  max-height: 80vh;
  overflow-y: auto;
}
.rules-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.rules-panel-title {
  font-size: 1.2rem;
  font-weight: 800;
}
.btn-close-rules {
  background: var(--bg);
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.btn-close-rules:hover { background: var(--border); color: var(--text); }
.rules-group {
  margin-bottom: 20px;
}
.rules-group-title {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--border);
}
.rule-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  transition: all 0.2s;
}
.rule-item.unlocked {
  background: var(--bg);
}
.rule-item.locked {
  background: var(--bg);
  opacity: 0.45;
  filter: blur(0.5px);
  position: relative;
}
.rule-key {
  font-weight: 700;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.rule-key .lock-icon { font-size: 0.75rem; }
.rule-article {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 1px 8px;
  border-radius: 10px;
  margin-left: 6px;
}
.rule-article.der { background: var(--der-bg); color: var(--der-dark); }
.rule-article.die { background: var(--die-bg); color: var(--die-dark); }
.rule-article.das { background: var(--das-bg); color: var(--das-dark); }
.rule-notes {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 3px;
}
.rule-count {
  font-size: 0.72rem;
  color: var(--text-tertiary);
  font-weight: 600;
  margin-top: 2px;
}

/* Keyboard hints */
.keyboard-hint {
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-tertiary);
  margin-top: -8px;
  margin-bottom: 12px;
}
.key-badge {
  display: inline-block;
  background: var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 0.68rem;
  margin: 0 2px;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>der / die / das</h1>
    <button class="rules-btn" id="rulesBtn" onclick="openRules()">📚 Rules</button>
  </div>

  <div class="accuracy-strip">
    <div class="dots-row" id="dotsRow"></div>
    <div class="accuracy-text" id="accuracyText">Answer to start tracking</div>
  </div>

  <div class="progress-section">
    <div class="progress-label">
      <span id="progressLabel">Rules unlocked</span>
      <span id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="card-container">
    <div class="word-card" id="wordCard">
      <div class="word-de" id="wordDe">Loading...</div>
      <div class="word-en" id="wordEn"></div>
      <div class="word-category" id="wordCategory"></div>
    </div>
  </div>

  <div class="buttons" id="buttonsRow">
    <button class="btn-article btn-der" onclick="answer('der')" id="btnDer">der</button>
    <button class="btn-article btn-die" onclick="answer('die')" id="btnDie">die</button>
    <button class="btn-article btn-das" onclick="answer('das')" id="btnDas">das</button>
  </div>

  <div class="keyboard-hint">
    Keyboard: <span class="key-badge">1</span> der &nbsp; <span class="key-badge">2</span> die &nbsp; <span class="key-badge">3</span> das
  </div>

  <div class="feedback" id="feedback">
    <div class="feedback-title wrong" id="feedbackTitle">✗ Incorrect</div>
    <div class="feedback-explanation" id="feedbackExplanation"></div>
    <div class="feedback-actions">
      <button class="btn-try-again" onclick="tryAgain()">Try Again</button>
      <button class="btn-skip" onclick="skipWord()">Skip →</button>
    </div>
  </div>
</div>

<!-- Unlock overlay -->
<div class="overlay" id="unlockOverlay">
  <div class="unlock-card">
    <div class="unlock-emoji">🎉</div>
    <div class="unlock-title" id="unlockTitle">New Rule Unlocked!</div>
    <div class="unlock-desc" id="unlockDesc"></div>
    <div class="unlock-examples" id="unlockExamples"></div>
    <button class="btn-continue" onclick="dismissUnlock()">Let's go!</button>
  </div>
</div>

<!-- Rules panel -->
<div class="rules-overlay" id="rulesOverlay" onclick="closeRulesOutside(event)">
  <div class="rules-panel" id="rulesPanel">
    <div class="rules-panel-header">
      <div class="rules-panel-title">📚 Gender Rules</div>
      <button class="btn-close-rules" onclick="closeRules()">✕</button>
    </div>
    <div id="rulesList"></div>
  </div>
</div>

// ─── State ───────────────────────────────────────────────────────────
const STORAGE_KEY = 'german-gender-trainer-v2';
const HISTORY_SIZE = 30;
const UNLOCK_THRESHOLD = 0.8;
const UNLOCK_WINDOW = 15;

let state = {
  unlockedRuleKeys: [],
  history: [],        // last 30: { correct: bool }
  totalCorrect: 0,
  totalAnswered: 0,
  currentNoun: null,
  wrongGuesses: [],    // articles guessed wrong on current word
  stakeCount: 0,       // answers in current unlock window
};

// ─── Build rule catalog ──────────────────────────────────────────────
// Group nouns by rule type + key
const ruleGroups = {};
NOUNS.forEach(n => {
  const rk = n.rule.type + '::' + n.rule.key;
  if (!ruleGroups[rk]) {
    ruleGroups[rk] = {
      type: n.rule.type,
      key: n.rule.key,
      ruleKey: rk,
      article: n.article,
      notes: n.rule.notes,
      nouns: [],
    };
  }
  ruleGroups[rk].nouns.push(n);
});

// Build unlock order
function buildUnlockOrder() {
  const suffixRules = [];
  const semanticRules = [];
  const exceptionRules = [];

  Object.values(ruleGroups).forEach(g => {
    if (g.type === 'suffix') suffixRules.push(g);
    else if (g.type === 'semantic') semanticRules.push(g);
    else exceptionRules.push(g);
  });

  // Sort each by number of words descending (most common first)
  suffixRules.sort((a, b) => b.nouns.length - a.nouns.length);
  semanticRules.sort((a, b) => b.nouns.length - a.nouns.length);
  exceptionRules.sort((a, b) => b.nouns.length - a.nouns.length);

  return [...suffixRules, ...semanticRules, ...exceptionRules].map(g => g.ruleKey);
}

const UNLOCK_ORDER = buildUnlockOrder();
const ALL_RULE_KEYS = UNLOCK_ORDER;

// ─── Persistence ─────────────────────────────────────────────────────
function saveState() {
  const s = {
    unlockedRuleKeys: state.unlockedRuleKeys,
    history: state.history,
    totalCorrect: state.totalCorrect,
    totalAnswered: state.totalAnswered,
    stakeCount: state.stakeCount,
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    // Validate unlocked keys still exist
    state.unlockedRuleKeys = (s.unlockedRuleKeys || []).filter(k => ruleGroups[k]);
    state.history = (s.history || []).slice(-HISTORY_SIZE);
    state.totalCorrect = s.totalCorrect || 0;
    state.totalAnswered = s.totalAnswered || 0;
    state.stakeCount = s.stakeCount || 0;
    return state.unlockedRuleKeys.length > 0;
  } catch(e) { return false; }
}

// ─── Initialization ──────────────────────────────────────────────────
function init() {
  const loaded = loadState();
  if (!loaded) {
    // Start with one feminine + one masculine suffix rule (most common of each)
    const suffixKeys = UNLOCK_ORDER.filter(rk => ruleGroups[rk].type === 'suffix');
    const firstFem = suffixKeys.find(rk => ruleGroups[rk].article === 'die');
    const firstMasc = suffixKeys.find(rk => ruleGroups[rk].article === 'der');
    state.unlockedRuleKeys = [firstFem, firstMasc].filter(Boolean);
    if (state.unlockedRuleKeys.length < 2) {
      // Fallback: use first 2 from unlock order
      state.unlockedRuleKeys = UNLOCK_ORDER.slice(0, 2);
    }
  }
  renderDots();
  renderAccuracy();
  renderProgress();
  nextWord();
}

// ─── Word selection ──────────────────────────────────────────────────
function getActivePool() {
  const pool = [];
  state.unlockedRuleKeys.forEach(rk => {
    if (ruleGroups[rk]) {
      ruleGroups[rk].nouns.forEach(n => pool.push(n));
    }
  });
  return pool;
}

function nextWord() {
  const pool = getActivePool();
  if (pool.length === 0) return;

  let noun;
  let attempts = 0;
  do {
    noun = pool[Math.floor(Math.random() * pool.length)];
    attempts++;
  } while (state.currentNoun && noun.word === state.currentNoun.word && pool.length > 1 && attempts < 20);

  state.currentNoun = noun;
  state.wrongGuesses = [];
  showWord(noun);
  hideFeedback();
  enableButtons();
}

// ─── UI rendering ────────────────────────────────────────────────────
function showWord(noun) {
  const card = document.getElementById('wordCard');
  card.classList.add('entering');

  requestAnimationFrame(() => {
    document.getElementById('wordDe').textContent = noun.word;
    document.getElementById('wordEn').textContent = noun.en;

    const rg = ruleGroups[noun.rule.type + '::' + noun.rule.key];
    const label = noun.rule.type === 'suffix' ? ('Suffix: ' + noun.rule.key) :
                  noun.rule.type === 'exception' ? 'Exception' :
                  noun.rule.key.replace(/_/g, ' ');

    requestAnimationFrame(() => {
      card.classList.remove('entering');
    });
  });
}

function renderDots() {
  const row = document.getElementById('dotsRow');
  row.innerHTML = '';
  for (let i = 0; i < HISTORY_SIZE; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i < state.history.length) {
      dot.classList.add(state.history[i].correct ? 'correct' : 'wrong');
      if (i === state.history.length - 1) dot.classList.add('latest');
    }
    row.appendChild(dot);
  }
}

function renderAccuracy() {
  const el = document.getElementById('accuracyText');
  if (state.history.length === 0) {
    el.innerHTML = 'Answer to start tracking';
    return;
  }
  const correct = state.history.filter(h => h.correct).length;
  const pct = Math.round((correct / state.history.length) * 100);
  el.innerHTML = `<strong>${correct} / ${state.history.length}</strong> correct (${pct}%) &nbsp;·&nbsp; Total: ${state.totalCorrect}/${state.totalAnswered}`;
}

function renderProgress() {
  const total = ALL_RULE_KEYS.length;
  const unlocked = state.unlockedRuleKeys.length;
  document.getElementById('progressCount').textContent = `${unlocked} / ${total}`;
  document.getElementById('progressFill').style.width = `${(unlocked / total) * 100}%`;
  document.getElementById('progressLabel').textContent =
    unlocked >= total ? '🏆 All rules unlocked!' : 'Rules unlocked';
}

function hideFeedback() {
  document.getElementById('feedback').classList.remove('show');
}

function showFeedback(noun) {
  const fb = document.getElementById('feedback');
  document.getElementById('feedbackTitle').textContent = '✗ Incorrect';
  document.getElementById('feedbackExplanation').innerHTML =
    `The correct answer is <strong style="color:${articleColor(noun.article)}">${noun.article} ${noun.word}</strong><br><br>` +
    `${noun.explanation}<br><em>${noun.rule.notes}</em>`;
  fb.classList.add('show', 'wrong-feedback');
}

function articleColor(a) {
  return a === 'der' ? 'var(--der-dark)' : a === 'die' ? 'var(--die-dark)' : 'var(--das-dark)';
}

function enableButtons() {
  ['btnDer', 'btnDie', 'btnDas'].forEach(id => {
    document.getElementById(id).classList.remove('disabled', 'correct-flash', 'wrong-flash');
  });
}

function disableWrongButton(article) {
  const map = { der: 'btnDer', die: 'btnDie', das: 'btnDas' };
  const btn = document.getElementById(map[article]);
  btn.classList.add('disabled');
  btn.classList.add('wrong-flash');
}

// ─── Answer logic ────────────────────────────────────────────────────
let isTransitioning = false;

function answer(article) {
  if (isTransitioning || !state.currentNoun) return;

  const noun = state.currentNoun;
  const correct = article === noun.article;

  if (correct) {
    isTransitioning = true;
    const map = { der: 'btnDer', die: 'btnDie', das: 'btnDas' };
    document.getElementById(map[article]).classList.add('correct-flash');

    // Only count as correct in history if no wrong guesses on this word
    const wasClean = state.wrongGuesses.length === 0;
    state.history.push({ correct: wasClean });
    if (state.history.length > HISTORY_SIZE) state.history.shift();
    if (wasClean) state.totalCorrect++;
    state.totalAnswered++;
    state.stakeCount++;

    renderDots();
    renderAccuracy();
    saveState();

    // Check for unlock only at the end of a complete 15-answer window
    const shouldUnlock = (state.stakeCount % UNLOCK_WINDOW === 0) ? checkUnlock() : null;

    setTimeout(() => {
      isTransitioning = false;
      if (shouldUnlock) {
        showUnlockOverlay(shouldUnlock);
      } else {
        nextWord();
      }
    }, shouldUnlock ? 200 : 180);
  } else {
    state.wrongGuesses.push(article);
    disableWrongButton(article);
    showFeedback(noun);
  }
}

function tryAgain() {
  hideFeedback();
}

function skipWord() {
  // Record as wrong
  state.history.push({ correct: false });
  if (state.history.length > HISTORY_SIZE) state.history.shift();
  state.totalAnswered++;
  renderDots();
  renderAccuracy();
  saveState();
  nextWord();
}

// ─── Unlock system ───────────────────────────────────────────────────
function checkUnlock() {
  if (state.unlockedRuleKeys.length >= ALL_RULE_KEYS.length) return null;
  if (state.history.length < UNLOCK_WINDOW) return null;

  const recent = state.history.slice(-UNLOCK_WINDOW);
  const correctCount = recent.filter(h => h.correct).length;
  const accuracy = correctCount / UNLOCK_WINDOW;

  if (accuracy >= UNLOCK_THRESHOLD) {
    // Find next rule to unlock
    for (const rk of UNLOCK_ORDER) {
      if (!state.unlockedRuleKeys.includes(rk)) {
        state.unlockedRuleKeys.push(rk);
        state.stakeCount = 0;  // reset so next unlock requires another full window
        saveState();
        renderProgress();
        return rk;
      }
    }
  }
  return null;
}

function showUnlockOverlay(ruleKey) {
  const group = ruleGroups[ruleKey];
  if (!group) return;

  const articleLabel = group.article;
  const keyDisplay = group.type === 'suffix' ? `Words ending in ${group.key}` :
                     group.type === 'exception' ? `Exception: ${group.key.replace(/_/g, ' ')}` :
                     group.key.replace(/_/g, ' ');

  document.getElementById('unlockTitle').textContent = 'New Rule Unlocked!';
  document.getElementById('unlockDesc').innerHTML =
    `<strong>${keyDisplay}</strong> → <span style="color:${articleColor(articleLabel)}">${articleLabel}</span><br>${group.notes}`;

  const exDiv = document.getElementById('unlockExamples');
  exDiv.innerHTML = '';
  const examples = group.nouns.slice(0, 3);
  examples.forEach(n => {
    const el = document.createElement('span');
    el.className = 'unlock-example';
    el.textContent = `${n.article} ${n.word}`;
    exDiv.appendChild(el);
  });

  document.getElementById('unlockOverlay').classList.add('show');
}

function dismissUnlock() {
  document.getElementById('unlockOverlay').classList.remove('show');
  nextWord();
}

// ─── Rules panel ─────────────────────────────────────────────────────
function openRules() {
  renderRulesPanel();
  document.getElementById('rulesOverlay').classList.add('show');
}

function closeRules() {
  document.getElementById('rulesOverlay').classList.remove('show');
}

function closeRulesOutside(e) {
  if (e.target === document.getElementById('rulesOverlay')) closeRules();
}

function renderRulesPanel() {
  const container = document.getElementById('rulesList');
  container.innerHTML = '';

  const types = [
    { type: 'suffix', label: 'Suffix Rules' },
    { type: 'semantic', label: 'Semantic Categories' },
    { type: 'exception', label: 'Exceptions' },
  ];

  types.forEach(({ type, label }) => {
    const rules = UNLOCK_ORDER
      .map(rk => ruleGroups[rk])
      .filter(g => g && g.type === type);

    if (rules.length === 0) return;

    const group = document.createElement('div');
    group.className = 'rules-group';

    const title = document.createElement('div');
    title.className = 'rules-group-title';
    title.textContent = label;
    group.appendChild(title);

    rules.forEach(g => {
      const unlocked = state.unlockedRuleKeys.includes(g.ruleKey);
      const item = document.createElement('div');
      item.className = 'rule-item ' + (unlocked ? 'unlocked' : 'locked');

      const keyDisplay = g.type === 'suffix' ? g.key :
                         g.type === 'exception' ? g.key.replace(/_/g, ' ') :
                         g.key.replace(/_/g, ' ');

      item.innerHTML = `
        <div class="rule-key">
          ${unlocked ? '' : '<span class="lock-icon">🔒</span>'}
          ${unlocked ? keyDisplay : '???'}
          <span class="rule-article ${g.article}">${g.article}</span>
        </div>
        ${unlocked ? `<div class="rule-notes">${g.notes}</div>` : '<div class="rule-notes">Unlock to reveal</div>'}
        <div class="rule-count">${g.nouns.length} word${g.nouns.length !== 1 ? 's' : ''}</div>
      `;
      group.appendChild(item);
    });

    container.appendChild(group);
  });
}

// ─── Keyboard support ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('unlockOverlay').classList.contains('show')) {
    if (e.key === 'Enter' || e.key === ' ') { dismissUnlock(); e.preventDefault(); }
    return;
  }
  if (document.getElementById('rulesOverlay').classList.contains('show')) {
    if (e.key === 'Escape') closeRules();
    return;
  }
  if (e.key === '1') answer('der');
  else if (e.key === '2') answer('die');
  else if (e.key === '3') answer('das');
  else if (e.key === 'Enter' && document.getElementById('feedback').classList.contains('show')) {
    tryAgain();
  }
  else if (e.key === 's' && document.getElementById('feedback').classList.contains('show')) {
    skipWord();
  }
  else if (e.key === 'r') openRules();
  else if (e.key === 'Escape') closeRules();
});

// ─── Init ────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
