<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>German Gender Trainer — der/die/das</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f8;
  --card: #ffffff;
  --primary: #6366f1;
  --primary-light: #a5b4fc;
  --primary-dark: #4338ca;
  --accent: #8b5cf6;
  --success: #22c55e;
  --success-bg: #dcfce7;
  --error: #ef4444;
  --error-bg: #fee2e2;
  --text: #1e1b4b;
  --text-secondary: #64748b;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 4px 24px rgba(99, 102, 241, 0.10);
  --shadow-lg: 0 8px 40px rgba(99, 102, 241, 0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --der: #3b82f6;
  --die: #ec4899;
  --das: #f59e0b;
  --der-bg: #dbeafe;
  --die-bg: #fce7f3;
  --das-bg: #fef3c7;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 24px 0 16px;
}
.header h1 {
  font-size: 1.6rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-top: 4px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-chip {
  flex: 1;
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.stat-chip .stat-value {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--primary);
}
.stat-chip .stat-label {
  font-size: 0.7rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.stat-chip.streak .stat-value { color: var(--accent); }

/* Phase tabs */
.phase-tabs {
  display: flex;
  gap: 5px;
  margin-bottom: 16px;
}
.phase-tab {
  flex: 1;
  padding: 8px 4px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--card);
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.2s;
  position: relative;
}
.phase-tab.active {
  border-color: var(--primary);
  color: var(--primary);
  background: #eef2ff;
}
.phase-tab.locked {
  opacity: 0.5;
  cursor: not-allowed;
}
.phase-tab .lock-icon {
  font-size: 0.85rem;
  display: block;
  margin-bottom: 2px;
}
.phase-tab .phase-progress {
  display: block;
  margin-top: 3px;
  font-size: 0.6rem;
  color: var(--text-secondary);
}

/* Progress bar */
.progress-container {
  margin-bottom: 16px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.progress-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* Phase intro */
.phase-intro {
  background: linear-gradient(135deg, #eef2ff, #f5f3ff);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  border: 1px solid var(--primary-light);
}
.phase-intro .phase-intro-tier {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--primary);
  background: white;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.phase-intro .phase-intro-text {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.5;
}

/* Rule card */
.rule-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.rule-card .rule-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-secondary);
  font-weight: 600;
  margin-bottom: 6px;
}
.rule-card .rule-text {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
}
.rule-card .rule-example {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 4px;
  font-style: italic;
}

/* Quiz card */
.quiz-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.quiz-card .word-display {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.quiz-card .word-meaning {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.quiz-card .compound-hint {
  font-size: 0.8rem;
  color: var(--text-tertiary);
  margin-bottom: 16px;
  padding: 8px 12px;
  background: #f8fafc;
  border-radius: var(--radius-sm);
  border: 1px dashed var(--border);
}
.quiz-card .compound-hint strong {
  color: var(--text-secondary);
}

/* Answer buttons */
.answer-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
}
.answer-btn {
  flex: 1;
  max-width: 130px;
  padding: 14px 8px;
  border-radius: var(--radius-sm);
  border: 2.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-family: inherit;
  font-size: 1.1rem;
  font-weight: 700;
  transition: all 0.15s;
  color: var(--text);
}
.answer-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.answer-btn:active:not(:disabled) {
  transform: translateY(0);
}
.answer-btn.btn-der { border-color: var(--der-bg); }
.answer-btn.btn-der:hover:not(:disabled) { background: var(--der-bg); border-color: var(--der); }
.answer-btn.btn-die { border-color: var(--die-bg); }
.answer-btn.btn-die:hover:not(:disabled) { background: var(--die-bg); border-color: var(--die); }
.answer-btn.btn-das { border-color: var(--das-bg); }
.answer-btn.btn-das:hover:not(:disabled) { background: var(--das-bg); border-color: var(--das); }

.answer-btn.correct {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
  transform: scale(1.05);
}
.answer-btn.wrong {
  background: var(--error-bg);
  border-color: var(--error);
  color: var(--error);
  animation: shake 0.4s ease;
}
.answer-btn:disabled { cursor: default; opacity: 0.6; }
.answer-btn.correct:disabled, .answer-btn.wrong:disabled { opacity: 1; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Feedback */
.feedback {
  margin-top: 20px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 600;
  animation: fadeIn 0.2s ease;
  text-align: left;
}
.feedback.correct {
  background: var(--success-bg);
  color: #166534;
}
.feedback.wrong {
  background: var(--error-bg);
  color: #991b1b;
}
.feedback .why-line {
  display: block;
  margin-top: 6px;
  font-size: 0.78rem;
  font-weight: 500;
  opacity: 0.85;
}
.feedback .tier-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-right: 4px;
}
.feedback.correct .tier-badge {
  background: #bbf7d0;
  color: #166534;
}
.feedback.wrong .tier-badge {
  background: #fecaca;
  color: #991b1b;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Next button */
.next-btn {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: none;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
}
.next-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
}

/* Rules mastered list */
.mastered-list {
  margin-top: 16px;
}
.mastered-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--card);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 0.8rem;
  border: 1px solid var(--border);
}
.mastered-item .check { color: var(--success); font-weight: 700; }
.mastered-item .pending { color: var(--border); }
.mastered-item.current { border-color: var(--primary); background: #eef2ff; }

/* Celebration */
.celebration {
  text-align: center;
  padding: 40px 20px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  margin-bottom: 16px;
  animation: fadeIn 0.5s ease;
}
.celebration .emoji { font-size: 3rem; margin-bottom: 12px; }
.celebration h2 {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 8px;
}
.celebration p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 20px;
}

/* Reset / settings */
.footer {
  text-align: center;
  padding: 16px 0 32px;
}
.reset-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  text-decoration: underline;
  padding: 8px;
}
.reset-btn:hover { color: var(--error); }

/* Keyboard hint */
.keyboard-hint {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-secondary);
  margin-top: 8px;
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 400px) {
  .quiz-card .word-display { font-size: 1.8rem; }
  .answer-btn { padding: 12px 6px; font-size: 1rem; }
  .stat-chip .stat-value { font-size: 1.1rem; }
  .phase-tab { font-size: 0.6rem; padding: 6px 3px; }
}
</style>
</head>

const MASTERY_THRESHOLD = 3; // correct answers needed to master a rule
const NUM_PHASES = PHASES.length;

// ============================================================
// STATE
// ============================================================

function loadState() {
  try {
    const saved = localStorage.getItem('german-gender-trainer-v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      // Migration: ensure unlockedPhases has correct length
      while (parsed.unlockedPhases.length < NUM_PHASES) {
        parsed.unlockedPhases.push(false);
      }
      return parsed;
    }
  } catch(e) {}
  // Try migrating from v1
  try {
    const v1 = localStorage.getItem('german-gender-trainer');
    if (v1) {
      const parsed = JSON.parse(v1);
      while (parsed.unlockedPhases.length < NUM_PHASES) {
        parsed.unlockedPhases.push(false);
      }
      localStorage.setItem('german-gender-trainer-v2', JSON.stringify(parsed));
      return parsed;
    }
  } catch(e) {}
  return defaultState();
}

function defaultState() {
  const unlocked = new Array(NUM_PHASES).fill(false);
  unlocked[0] = true;
  return {
    currentPhase: 0,
    unlockedPhases: unlocked,
    ruleProgress: {},  // ruleId -> { correct: N, total: N, mastered: bool }
    sessionScore: { correct: 0, total: 0 },
    streak: 0,
    bestStreak: 0,
    celebration: null, // null or phase index just completed
  };
}

function saveState(state) {
  localStorage.setItem('german-gender-trainer-v2', JSON.stringify(state));
}

let state = loadState();
// Session score resets each load
state.sessionScore = { correct: 0, total: 0 };
state.celebration = null;

// Current quiz state (not persisted)
let currentRuleIndex = null;
let currentWordIndex = null;
let currentWords = [];
let answered = false;
let lastRuleId = null; // track when rule changes to reshuffle

// ============================================================
// HELPERS
// ============================================================

function getRuleProgress(ruleId) {
  if (!state.ruleProgress[ruleId]) {
    state.ruleProgress[ruleId] = { correct: 0, total: 0, mastered: false };
  }
  return state.ruleProgress[ruleId];
}

function getPhaseRules(phaseIdx) {
  return PHASES[phaseIdx].rules;
}

function getPhaseProgress(phaseIdx) {
  if (phaseIdx < 0 || phaseIdx >= NUM_PHASES) return { mastered: 0, total: 0 };
  const rules = getPhaseRules(phaseIdx);
  const mastered = rules.filter(r => getRuleProgress(r.id).mastered).length;
  return { mastered, total: rules.length };
}

function isPhaseComplete(phaseIdx) {
  const { mastered, total } = getPhaseProgress(phaseIdx);
  return mastered === total;
}

function findCurrentRule(phaseIdx) {
  const rules = getPhaseRules(phaseIdx);
  // Find first non-mastered rule
  for (let i = 0; i < rules.length; i++) {
    if (!getRuleProgress(rules[i].id).mastered) return i;
  }
  return -1; // all mastered
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickWord(rule) {
  // Reset shuffle when rule changes
  if (lastRuleId !== rule.id) {
    currentWords = shuffleArray(rule.words);
    currentWordIndex = 0;
    lastRuleId = rule.id;
  }
  if (currentWords.length === 0 || currentWordIndex >= currentWords.length) {
    currentWords = shuffleArray(rule.words);
    currentWordIndex = 0;
  }
  const w = currentWords[currentWordIndex];
  currentWordIndex++;
  return w;
}

// ============================================================
// RENDER
// ============================================================

function render() {
  const app = document.getElementById('app');

  // Check for celebration first
  if (state.celebration !== null) {
    renderCelebration(app);
    return;
  }

  const phase = PHASES[state.currentPhase];
  const ruleIdx = findCurrentRule(state.currentPhase);

  if (ruleIdx === -1) {
    // Phase complete — trigger celebration or move to next
    if (state.currentPhase < NUM_PHASES - 1) {
      state.celebration = state.currentPhase;
      state.unlockedPhases[state.currentPhase + 1] = true;
      saveState(state);
      render();
      return;
    } else {
      renderAllComplete(app);
      return;
    }
  }

  currentRuleIndex = ruleIdx;
  const rule = phase.rules[ruleIdx];
  const word = pickWord(rule);
  const progress = getPhaseProgress(state.currentPhase);

  app.innerHTML = `
    ${renderHeader()}
    ${renderStats()}
    ${renderPhaseTabs()}
    ${renderProgressBar(progress)}
    ${renderPhaseIntro(phase)}
    ${renderRuleCard(rule, phase)}
    ${renderQuizCard(word, rule, phase)}
    ${renderRulesList(phase.rules)}
    ${renderFooter()}
  `;

  bindQuizEvents(word, rule, phase);
  bindPhaseTabEvents();
  bindResetEvent();
}

function renderRuleCard(rule, phase) {

    : `<div class="rule-example">${rule.example}</div>`;
  return `

  `;
}

function renderQuizCard(word, rule, phase) {

  return `

      <div class="word-display" id="word-display">${word.word}</div>
      <div class="word-meaning">${word.meaning}</div>

      <div class="answer-buttons" id="answer-buttons">
        <button class="answer-btn btn-der" data-answer="der">der</button>

      <div class="keyboard-hint">Keyboard: 1 = der · 2 = die · 3 = das · Enter/Space = next</div>

}

      ${nextPhase ? `
        <p><strong>${nextPhase.icon} ${nextPhase.tierLabel}</strong> is now unlocked!</p>
        <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:20px;line-height:1.4">${nextPhase.intro}</p>
        <button class="next-btn" id="continue-btn">
          Start ${nextPhase.name} →
        </button>
      ` : `
        <p>You've completed all phases! 🎓</p>
        <button class="next-btn" id="continue-btn">
          Continue Practicing
        </button>
      `}
    </div>
    ${renderFooter()}
  `;

  document.getElementById('continue-btn').addEventListener('click', () => {
    if (state.celebration < NUM_PHASES - 1) {
      state.currentPhase = state.celebration + 1;
    }
    state.celebration = null;
    saveState(state);
    currentWords = [];
    lastRuleId = null;
    render();
  });
  bindResetEvent();
}

function renderAllComplete(app) {
  const totalRules = PHASES.reduce((s, p) => s + p.rules.length, 0);
  app.innerHTML = `
    ${renderHeader()}
    ${renderStats()}
    <div class="celebration">
      <div class="emoji">🎓✨🇩🇪</div>
      <h2>All Phases Complete!</h2>
      <p>You've mastered all ${totalRules} gender rules across all 4 tiers. Incredible!</p>
      <p style="margin-bottom:20px">Keep practicing to maintain your knowledge.</p>
      <button class="next-btn" id="practice-btn">Free Practice</button>
    </div>
    ${renderPhaseTabs()}
    ${renderFooter()}
  `;

  document.getElementById('practice-btn').addEventListener('click', () => {
    // Reset mastery for current phase to allow re-practice
    const rules = getPhaseRules(state.currentPhase);
    rules.forEach(r => {
      state.ruleProgress[r.id] = { correct: 0, total: 0, mastered: false };
    });
    saveState(state);
    currentWords = [];
    lastRuleId = null;
    render();
  });
  bindPhaseTabEvents();
  bindResetEvent();
}

// ============================================================
// EVENT BINDING
// ============================================================

function bindQuizEvents(word, rule, phase) {
  const buttons = document.querySelectorAll('.answer-btn');
  answered = false;

  function handleAnswer(chosenArticle) {
    if (answered) return;
    answered = true;

    const correct = chosenArticle === rule.gender;
    const rp = getRuleProgress(rule.id);

    // Update state
    state.sessionScore.total++;
    rp.total++;
    if (correct) {
      state.sessionScore.correct++;
      rp.correct++;
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      if (rp.correct >= MASTERY_THRESHOLD) rp.mastered = true;
    } else {
      state.streak = 0;
      // On wrong answer, reduce correct count (min 0) to require re-learning
      rp.correct = Math.max(0, rp.correct - 1);
    }
    saveState(state);

    // Visual feedback on buttons
    buttons.forEach(btn => {
      const ans = btn.dataset.answer;
      btn.disabled = true;
      if (ans === chosenArticle && correct) btn.classList.add('correct');
      if (ans === chosenArticle && !correct) btn.classList.add('wrong');
      if (ans === rule.gender && !correct) btn.classList.add('correct');
    });

    // Update stats live
    const statsBar = document.querySelector('.stats-bar');
    if (statsBar) {
      statsBar.innerHTML = renderStatsInner();
    }

    // Build "Why?" explanation
    const tierLabel = `Tier ${phase.tier}: ${phase.name}`;
    const whyText = rule.why || rule.desc;

    const feedbackArea = document.getElementById('feedback-area');
    if (correct) {
      feedbackArea.innerHTML = `
        <div class="feedback correct">
          ✓ Correct! <strong>${rule.gender} ${word.word}</strong>
          <span class="why-line"><span class="tier-badge">${tierLabel}</span>${whyText}</span>
        </div>`;
    } else {
      feedbackArea.innerHTML = `
        <div class="feedback wrong">
          ✗ It's <strong>${rule.gender} ${word.word}</strong>, not ${chosenArticle}.
          <span class="why-line"><span class="tier-badge">${tierLabel}</span>${whyText}</span>
        </div>`;
    }

    document.getElementById('next-area').style.display = 'block';

    // Update mastery hint
    const rp2 = getRuleProgress(rule.id);
    const needed = MASTERY_THRESHOLD - rp2.correct;
    const hint = document.getElementById('mastery-hint');
    if (hint && rp2.mastered) {
      hint.innerHTML = `<strong style="color:var(--success)">✓ Rule mastered!</strong>`;
    } else if (hint) {
      hint.textContent = `${needed > 0 ? needed : 0} more correct to master this rule`;
    }

    document.getElementById('next-btn').focus();
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(btn.dataset.answer));
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    render();
  });

  // Keyboard support
  function keyHandler(e) {
    if (e.key === '1') handleAnswer('der');
    if (e.key === '2') handleAnswer('die');
    if (e.key === '3') handleAnswer('das');
    if ((e.key === 'Enter' || e.key === ' ') && answered) {
      e.preventDefault();
      render();
    }
  }
  document.addEventListener('keydown', keyHandler);
  window._keyHandler = keyHandler;
}

function bindPhaseTabEvents() {
  document.querySelectorAll('.phase-tab:not(.locked)').forEach(tab => {
    tab.addEventListener('click', () => {
      const phaseIdx = parseInt(tab.dataset.phase);
      if (state.unlockedPhases[phaseIdx]) {
        state.currentPhase = phaseIdx;
        saveState(state);
        currentWords = [];
        lastRuleId = null;
        render();
      }
    });
  });
}

function bindResetEvent() {
  const btn = document.getElementById('reset-btn');
  if (btn) {
    btn.addEventListener('click', () => {
      if (confirm('Reset all progress? This cannot be undone.')) {
        localStorage.removeItem('german-gender-trainer-v2');
        state = defaultState();
        currentWords = [];
        lastRuleId = null;
        render();
      }
    });
  }
}

// Clean up keyboard handlers before re-render
const origRender = render;
render = function() {
  if (window._keyHandler) {
    document.removeEventListener('keydown', window._keyHandler);
    window._keyHandler = null;
  }
  origRender();
};

// ============================================================
// INIT
// ============================================================
render();
</script>
